dist: focal
os:
  - linux
  - osx
  - windows

osx_image:
  - xcode16.4
  - xcode17

compiler:
  - gcc
  - clang
  - msvc

language: cpp

env:
  global:
    - CXXFLAGS="-Wall -Wextra -Wpedantic -Werror"
    - BUILD_TYPE=Release

jobs:
  exclude:
    - os: linux
      osx_image: xcode16.4
    - os: linux
      osx_image: xcode17
    - os: osx
      compiler: gcc
    - os: osx
      compiler: msvc
    - os: linux
      compiler: msvc
    - os: windows
      compiler: gcc
    - os: windows
      compiler: clang

install:
  - |
    if [ "$TRAVIS_OS_NAME" = "linux" ]; then
      sudo apt-get update -qq
      sudo apt-get install -y cmake ninja-build
    fi
  - |
    if [ "$TRAVIS_OS_NAME" = "osx" ]; then
      brew install cmake ninja
    fi
  - |
    if [ "$TRAVIS_OS_NAME" = "windows" ]; then
      choco install cmake ninja --no-progress
    fi

script:
  - cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -G Ninja
  - cmake --build build --parallel
  - cd build && ctest --output-on-failure

notifications:
  email: false
