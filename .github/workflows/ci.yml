name: CI

on:
  push:
    branches: [main, master, channel]
  pull_request:
    branches: [main, master, channel]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            cc: gcc
            cxx: g++
          - name: Clang
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build g++ clang

      - name: Configure
        run: |
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOLORCPP_BUILD_TESTS=ON \
            -DCOLORCPP_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verify target)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: verify
          tags: colorcpp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
